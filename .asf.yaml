jekyll:
  whoami: master
  target: asf-site

publish:
  whoami: asf-site

github:
  homepage: "https://datasketches.apache.org"
  labels:
    - website
    - jekyll
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
